repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (check)
        entry: ruff check
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff (format)
        entry: ruff format
        language: system
        types: [python]
        pass_filenames: true
        require_serial: true

      - id: markdownlint
        name: markdownlint
        entry: npx markdownlint
        language: node
        types: [markdown]
        pass_filenames: true
